<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Personal Blog</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background-color: #fff; /* White background */
      color: #000; /* Default text color black */
    }

    .main {
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .island {
      background: #f9f9f9; /* Light gray for contrast */
      border-radius: 12px;
      padding: 20px;
      text-align: center;
      width: 300px;
      box-shadow: 0 4px 8px rgba(0,0,0,0.1);
      border: 5px solid #000; /* Black border */
      box-shadow:
        0 0 8px 2px rgba(0,0,0,0.8),
        0 0 15px 4px rgba(0,0,0,0.6);
    }

    .prof img {
      width: 220px;
      height: 220px;
      border-radius: 50%;
      margin-bottom: 10px;
      border: 2px solid #000; /* Black border for image */
    }

    .prof h2 {
      margin: 5px 0;
      font-size: 20px;
      color: #000; /* Black heading */
    }

    .prof h6 {
      margin: 0;
      color: #555; /* Medium gray text */
      font-weight: normal;
    }

    .content {
      margin: 15px 0;
    }

    .content h4 {
      font-size: 14px;
      font-weight: normal;
      line-height: 1.4;
      color: #333; /* Dark gray for readability */
    }

    .footer {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-top: 15px;
    }

    .footer a {
      text-decoration: none;
      color: #000;
      padding: 8px;
      border-radius: 6px;
      background-color: #ddd;
      transition: background 0.3s;
    }

    /* Gradient style for the first two buttons */
    .footer a:nth-child(1),
    .footer a:nth-child(2) {
      position: relative;
      overflow: hidden;
      background: linear-gradient(90deg, #1e3c72 0%, #2a5298 50%, #38a1db 100%);
      color: #fff;
      font-weight: bold;
      font-size: 20px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.12);
      border: none;
      z-index: 1;
    }
    .footer a:nth-child(1):hover,
    .footer a:nth-child(2):hover {
      filter: brightness(1.08);
    }

    .footer a:hover {
      background-color: #bbb; /* Darker button on hover */
    }
  </style>
</head>
<body>
  <div class="main">
    <div class="island">
      <div class="prof">
        <img src="Best 2025.jpg" alt="Profile Picture" />
        <h2><b>Kiran Manupati</b></h2>
      </div>
      <div class="footer">
        <a href="https://themanupati22.github.io/Profilepage" target="_blank">Portfolio</a>
        <a href="https://drive.google.com/drive/folders/1JvecMv15L8X8u6wPp0E7TCoWkOdLi54i" target="_blank">Certificates</a>
      </div>
    </div>
  </div>
</body>
</html>
